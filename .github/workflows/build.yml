name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      package_version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}-build.${{ github.run_number }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push git tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "${{ github.sha }}" -m "Note Reader ${TAG}"
          git push origin "$TAG"

      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          RUN_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
        with:
          script: |
            const version = process.env.PACKAGE_VERSION;
            const tag = process.env.TAG_NAME;
            const run = process.env.RUN_NUMBER;
            const sha = process.env.SHA.slice(0, 7);
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: process.env.SHA,
              name: `Note Reader ${tag}`,
              body: [
                '构建完成后会自动发布，可在下方 Assets 下载安装包。',
                '',
                `- Tag：\`${tag}\``,
                `- 版本：\`v${version}\``,
                `- 分支：\`main\``,
                `- 提交：\`${sha}\``,
                `- 运行编号：\`${run}\``,
              ].join('\n'),
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
          - platform: windows-latest
            rust_target: ""
            args: --bundles nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # Local .cargo/config.toml points at rsproxy.cn; GitHub runners should use crates.io.
      - name: Use crates.io for CI
        shell: bash
        run: rm -f src-tauri/.cargo/config.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    needs: [create-release, build]
    if: success()
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          TAG_NAME: ${{ needs.create-release.outputs.tag_name }}
        with:
          script: |
            const tag = process.env.TAG_NAME;
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.RELEASE_ID,
              draft: false,
              prerelease: false,
              body: [
                '构建已完成，请在下方 Assets 下载对应平台安装包。',
                '',
                `- Tag：\`${tag}\``,
                '',
                '- macOS Apple Silicon：`.dmg`',
                '- macOS Intel：`.dmg`',
                '- Windows：`.exe` 安装程序',
              ].join('\n'),
            });

  cleanup-draft:
    needs: [create-release, build]
    if: failure()
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Delete failed draft release and tag
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          TAG_NAME: ${{ needs.create-release.outputs.tag_name }}
        with:
          script: |
            const id = process.env.RELEASE_ID;
            const tag = process.env.TAG_NAME;
            if (id) {
              try {
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: id,
                });
              } catch (e) {
                core.warning(`deleteRelease: ${e.message}`);
              }
            }
            if (tag) {
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${tag}`,
                });
              } catch (e) {
                core.warning(`deleteTag: ${e.message}`);
              }
            }
