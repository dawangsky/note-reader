name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      package_version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
          RUN_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
        with:
          script: |
            const version = process.env.PACKAGE_VERSION;
            const run = process.env.RUN_NUMBER;
            const sha = process.env.SHA.slice(0, 7);
            const tag = `v${version}-build.${run}`;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Note Reader v${version} (build ${run})`,
              body: [
                '构建完成后会自动发布，可在下方 Assets 下载安装包。',
                '',
                `- 分支：\`main\``,
                `- 提交：\`${sha}\``,
                `- 运行编号：\`${run}\``,
              ].join('\n'),
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
          - platform: windows-latest
            rust_target: ""
            args: --bundles nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # Local .cargo/config.toml points at rsproxy.cn; GitHub runners should use crates.io.
      - name: Use crates.io for CI
        shell: bash
        run: rm -f src-tauri/.cargo/config.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    needs: [create-release, build]
    if: success()
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.RELEASE_ID,
              draft: false,
              prerelease: false,
              body: [
                '构建已完成，请在下方 Assets 下载对应平台安装包。',
                '',
                '- macOS Apple Silicon：`.dmg`',
                '- macOS Intel：`.dmg`',
                '- Windows：`.exe` 安装程序',
              ].join('\n'),
            });

  cleanup-draft:
    needs: [create-release, build]
    if: failure()
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Delete failed draft release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            const id = process.env.RELEASE_ID;
            if (!id) return;
            await github.rest.repos.deleteRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: id,
            });
