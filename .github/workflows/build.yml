name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
            artifact_name: note-reader-macos-aarch64
            artifact_path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
            artifact_name: note-reader-macos-x64
            artifact_path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - platform: windows-latest
            rust_target: ""
            args: --bundles nsis
            artifact_name: note-reader-windows-x64
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # Local .cargo/config.toml points at rsproxy.cn; GitHub runners should use crates.io.
      - name: Use crates.io for CI
        run: rm -f src-tauri/.cargo/config.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: build-${{ github.run_number }}
          releaseName: Note Reader build ${{ github.run_number }}
          releaseBody: |
            自动构建自 `main`（`${{ github.sha }}`）。

            可在下方 Assets 下载安装包，或到对应 workflow run 的 Artifacts 下载。
          releaseDraft: true
          prerelease: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 30
